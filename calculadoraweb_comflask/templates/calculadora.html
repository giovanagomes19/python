<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <h1>Calculadora Flask</h1>

    <div id="calculator">

        <form method="POST" action="{{ url_for('index') }}">

            <!-- NUM1 -->
            <div class="form-grupo">
                <label for="num1">Número A</label>

                <input type="number"
                       id="num1"
                       name="num1"
                       step="any"
                       required
                       value="{{ request.form.get('num1', '') }}">
            </div>

            <!-- OPERAÇÃO -->
            <div class="form-grupo">

                <label for="operacao">Operação</label>

                {% set op = request.form.get('operacao', '+') %}

                <select id="operacao"
                        name="operacao"
                        onchange="atualizarCampos()">

                    <option value="+">Somar</option>

                    <option value="-">Subtrair</option>

                    <option value="*">Multiplicar</option>

                    <option value="/">Dividir</option>

                    <option value="**">Potência</option>

                    <option value="sqrt">Raiz quadrada</option>

                    <option value="log">Logaritmo</option>

                    <option value="bhaskara">Bhaskara</option>

                </select>
            </div>

            <!-- NUM2 -->
            <div class="form-grupo" id="grupo-num2">

                <label for="num2">Número B</label>

                <input type="number"
                       id="num2"
                       name="num2"
                       step="any"
                       value="{{ request.form.get('num2', '') }}">
            </div>

            <!-- NUM3 -->
            <div class="form-grupo" id="grupo-num3">

                <label for="num3">Número C (Bhaskara)</label>

                <input type="number"
                       id="num3"
                       name="num3"
                       step="any"
                       value="{{ request.form.get('num3', '') }}">
            </div>

            <button type="submit">Calcular</button>

        </form>

        {% if etapas %}

        <div class="resultado">

            <strong>Resposta do servidor:</strong>

            <div>{{ etapas }}</div>

            <div>
                Resultado: {{ resultados }}
            </div>

        </div>

        {% endif %}

        <a href="{{ url_for('index') }}">
            Limpar / Nova conta
        </a>

    </div>

    <script>

        function atualizarCampos() {

            const operacao =
                document.getElementById("operacao").value;

            const grupoNum2 =
                document.getElementById("grupo-num2");

            const grupoNum3 =
                document.getElementById("grupo-num3");

            // RAIZ E LOG
            if (operacao === "sqrt" || operacao === "log") {

                grupoNum2.style.display = "none";
                grupoNum3.style.display = "none";
            }

            // BHASKARA
            else if (operacao === "bhaskara") {

                grupoNum2.style.display = "block";
                grupoNum3.style.display = "block";
            }

            // OUTRAS
            else {

                grupoNum2.style.display = "block";
                grupoNum3.style.display = "none";
            }
        }

        atualizarCampos();

    </script>

</body>
</html>
